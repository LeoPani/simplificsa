    // ─── Badge de risco ────────────────────────────────────────────────────────
    function riscoBadgeClass(risco) {
      if (!risco) return 'bg-slate-100 text-slate-600';
      const r = risco.toLowerCase();
      if (r.includes('alto'))   return 'bg-red-100 text-red-700 border border-red-200';
      if (r.includes('médio'))  return 'bg-amber-100 text-amber-700 border border-amber-200';
      return 'bg-green-100 text-green-700 border border-green-200';
    }

    function categoriaBadgeClass(cat) {
      const c = (cat || '').toLowerCase();
      if (c.includes('ambiental'))    return 'bg-emerald-50 text-emerald-700';
      if (c.includes('federal'))      return 'bg-blue-50 text-blue-700';
      if (c.includes('municipal'))    return 'bg-violet-50 text-violet-700';
      if (c.includes('sanitária'))    return 'bg-pink-50 text-pink-700';
      if (c.includes('energia'))      return 'bg-yellow-50 text-yellow-700';
      if (c.includes('tributária'))   return 'bg-orange-50 text-orange-700';
      return 'bg-slate-100 text-slate-600';
    }

    // ─── Renderização ──────────────────────────────────────────────────────────
    function renderResults(sectorKey, porteKey, dataInicio) {
      const container = document.getElementById("results-container");
      const sector = dbSectors[sectorKey];
      const porte = sector && sector.portes[porteKey];
      if (!porte || !porte.requisitos || porte.requisitos.length === 0) {
        container.innerHTML = "<p class=\"text-center text-slate-400 mt-8\">Setor sem requisitos cadastrados.</p>"; return;
      }
      const badgeClass = riscoBadgeClass(porte.risco);
      let baseDate = dataInicio ? new Date(dataInicio) : null;
      const cardsHTML = porte.requisitos.map((req, i) => {
        let dataConclusao = "";
        if (baseDate) {
          baseDate.setDate(baseDate.getDate() + 30); // simula 30 dias por etapa
          dataConclusao = `<div class="mt-2 bg-teal-50 border border-teal-100 rounded-md px-3 py-1.5 inline-block text-xs font-semibold text-teal-700">📅 Previsão: ${baseDate.toLocaleDateString("pt-BR")}</div>`;
        }
        return `
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 flex flex-col gap-3 relative">
      <div class="absolute -left-3 top-6 w-6 h-6 bg-slate-900 rounded-full text-white text-xs flex items-center justify-center font-bold border-4 border-slate-50">${i + 1}</div>
      <div class="pl-4">
        <h3 class="text-slate-800 font-semibold">${req.titulo}</h3>
        <p class="text-slate-500 text-sm mt-1">${req.descricao}</p>
        <p class="text-slate-400 text-xs mt-1">Legislação: ${req.legislacao}</p>
        ${dataConclusao}
      </div>
    </div>`;
      }).join("");
      container.innerHTML = `
    <div class="mb-6">
      <h2 class="text-2xl font-bold text-slate-800">${sector.label} — Porte ${porteKey}</h2>
      <div class="mt-2 text-sm font-semibold px-4 py-1.5 rounded-full inline-block ${badgeClass}">Risco: ${porte.risco}</div>
    </div>
    <div class="border-l-2 border-slate-200 ml-3 pl-4 flex flex-col gap-6">${cardsHTML}</div>`;
      container.scrollIntoView({ behavior: "smooth", block: "start" });
    }

      <div
        id="chat-window"
        class="hidden absolute bottom-16 right-0 w-80 sm:w-96 bg-white rounded-2xl shadow-2xl border border-slate-100 flex flex-col overflow-hidden"
        style="max-height: 520px;"
      >
        <!-- Cabeçalho -->
        <div class="bg-slate-900 px-4 py-3 flex items-center gap-3">
          <span class="w-2 h-2 rounded-full bg-teal-400 animate-pulse"></span>
          <span class="text-white text-sm font-semibold">Assistente simplifICSA</span>
          <span class="ml-auto text-slate-400 text-xs">Groq · llama3</span>
        </div>

        <!-- Mensagens -->
        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3" style="min-height:200px; max-height:340px;">
          <div class="chat-bubble assistant">
            <div class="bg-slate-100 text-slate-700 text-sm rounded-2xl rounded-tl-sm px-4 py-2.5 max-w-xs leading-relaxed">
              Olá! Sou o assistente do simplifICSA. Pergunte sobre licenças, obrigações fiscais ou regulamentações para sua indústria em Mariana/MG.
            </div>
          </div>
        </div>

        <!-- Input -->
        <div class="border-t border-slate-100 px-3 py-3 flex gap-2 items-end bg-white">
          <textarea
            id="chat-input"
            rows="1"
            placeholder="Digite sua pergunta..."
            class="flex-1 resize-none border border-slate-200 rounded-xl px-3 py-2 text-sm text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-teal-400 leading-relaxed"
            style="max-height:100px;"
          ></textarea>
          <button
            id="chat-send"
            class="flex-shrink-0 w-9 h-9 flex items-center justify-center rounded-xl bg-teal-500 hover:bg-teal-600 active:bg-teal-700 transition-colors shadow"
            aria-label="Enviar"
          >
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </button>
        </div>
      </div>
    `;

    // ─── Toggle da janela ──────────────────────────────────────────────────────
    document.getElementById('chat-toggle').addEventListener('click', function () {
      const win       = document.getElementById('chat-window');
      const iconOpen  = document.getElementById('chat-icon-open');
      const iconClose = document.getElementById('chat-icon-close');
      const isHidden  = win.classList.toggle('hidden');
      iconOpen.classList.toggle('hidden', !isHidden);
      iconClose.classList.toggle('hidden', isHidden);
      if (!isHidden) document.getElementById('chat-input').focus();
    });

    // ─── Utilitários de UI ─────────────────────────────────────────────────────
    function appendBubble(role, text) {
      const messages = document.getElementById('chat-messages');
      const wrap = document.createElement('div');
      wrap.className = 'chat-bubble ' + role;

      const bubble = document.createElement('div');
      bubble.textContent = text;

      if (role === 'user') {
        wrap.className += ' flex justify-end';
        bubble.className = 'bg-teal-500 text-white text-sm rounded-2xl rounded-tr-sm px-4 py-2.5 max-w-xs leading-relaxed';
      } else {
        bubble.className = 'bg-slate-100 text-slate-700 text-sm rounded-2xl rounded-tl-sm px-4 py-2.5 max-w-xs leading-relaxed';
      }

      wrap.appendChild(bubble);
      messages.appendChild(wrap);
      messages.scrollTop = messages.scrollHeight;
      return bubble;
    }

    function setInputLocked(locked) {
      document.getElementById('chat-input').disabled = locked;
      document.getElementById('chat-send').disabled  = locked;
    }

    // ─── Chamada à API Groq ────────────────────────────────────────────────────
    async function sendToGroq(userText) {
      chatHistory.push({ role: 'user', content: userText });

      const thinkingBubble = appendBubble('assistant', '…');
      setInputLocked(true);

      try {
        if (!GROQ_API_KEY) {
          throw new Error('GROQ_API_KEY não configurada. Defina a chave no arquivo index.html.');
        }

        const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + GROQ_API_KEY,
          },
          body: JSON.stringify({
            model: GROQ_MODEL,
            messages: chatHistory,
            temperature: 0.5,
            max_tokens: 1024,
          }),
        });

        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          throw new Error(err.error?.message || 'Erro ' + response.status + ' na API Groq.');
        }

        const data = await response.json();
        const assistantText = data.choices?.[0]?.message?.content?.trim() || 'Sem resposta da API.';
        chatHistory.push({ role: 'assistant', content: assistantText });
        thinkingBubble.textContent = assistantText;
      } catch (err) {
        thinkingBubble.className = 'bg-red-50 text-red-600 text-sm rounded-2xl rounded-tl-sm px-4 py-2.5 max-w-xs leading-relaxed border border-red-100';
        thinkingBubble.textContent = '⚠ ' + err.message;
        chatHistory.pop();
      } finally {
        setInputLocked(false);
        document.getElementById('chat-input').focus();
      }
    }

    // ─── Listeners de envio ────────────────────────────────────────────────────
    document.getElementById('chat-send').addEventListener('click', function () {
      const input = document.getElementById('chat-input');
      const text  = input.value.trim();
      if (!text) return;
      appendBubble('user', text);
      input.value = '';
      input.style.height = 'auto';
      sendToGroq(text);
    });

    document.getElementById('chat-input').addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        document.getElementById('chat-send').click();
      }
    });

    document.getElementById('chat-input').addEventListener('input', function () {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 100) + 'px';
    });
  </script>
</body>
</html>
